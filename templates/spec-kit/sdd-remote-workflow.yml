schema_version: "1.0"
workflow:
  id: "sdd-remote"
  name: "SDD Remote"
  version: "3.1.0"
  author: "Integrity"
  description: >-
    Laptop SDD auto-continues through tasks, then Mac mini handoff runs
    implement → converge → confidence (default remote_phase=implement).
    Exhausted repair caps stop the run. Set transfer_only=true to skip laptop
    phases. Each named phase invokes the orchestrator in single_phase mode;
    this workflow owns sequencing.

requires:
  speckit_version: ">=0.13.0"
  integrations:
    any:
      - "cursor-agent"

inputs:
  spec:
    type: string
    required: false
    default: "Continue SDD from tasks.md on current branch"
    prompt: "Feature description (or continue context for transfer-only)"
  integration:
    type: string
    default: "auto"
    prompt: "Integration (auto uses project default, e.g. cursor-agent)"
  scope:
    type: string
    default: "full"
    enum: ["full", "api-only", "frontend-only"]
  interval:
    type: string
    default: "600"
    prompt: "Seconds between remote agent ticks (default 600)"
  model:
    type: string
    default: ""
    prompt: "Optional cursor agent model; empty = Cursor default"
  remote_phase:
    type: string
    default: "implement"
    enum: ["implement", "converge", "confidence", "test-fix"]
    prompt: "Remote phase after transfer (implement runs through converge→confidence on mini)"
  transfer_only:
    type: string
    default: "false"
    enum: ["true", "false"]
    prompt: "true = skip laptop specify→tasks; hand off current branch only"
  model_profile:
    type: string
    default: "balanced"
    enum: ["lean", "balanced", "frontier", "legacy"]
    prompt: "Model profile: lean (cheap), balanced (default), frontier (max reliability)"

steps:
  - id: route-transfer
    type: if
    condition: "inputs.transfer_only == 'true'"
    then:
      - id: handoff-only
        type: prompt
        integration: "{{ inputs.integration }}"
        prompt: >-
          Write .cursor/session-handoff.md per compact-handoff rule.
          Context: {{ inputs.spec }}.
          Remote phase: {{ inputs.remote_phase }}.
          Include tasks.md progress, specs path, and a Resume Prompt for the Mac mini.
          Remote agent should use sdd-orchestrator for each phase (always-on).
          If phase is implement, remote should continue through converge (round
          cap 2) then confidence. If phase is converge, reference
          speckit.converge. If phase is confidence, reference speckit.confidence
          (max 3 iterations).

      - id: preflight-local-only
        type: shell
        run: "bash scripts/remote_agent_preflight.sh --local"

      - id: start-remote-only
        type: shell
        run: >-
          bash scripts/start_remote_sdd_handoff.sh
          --interval {{ inputs.interval }}
          --phase {{ inputs.remote_phase }}
          --model "{{ inputs.model }}"

      - id: preflight-remote-only
        type: shell
        run: "bash scripts/remote_agent_preflight.sh --remote"
        continue_on_error: true

      - id: remote-status-only
        type: shell
        run: "bash scripts/handoff_to_mac_mini.sh --status"
        continue_on_error: true

      - id: end-report-only
        type: prompt
        integration: "{{ inputs.integration }}"
        prompt: >-
          Run the absolute-path sdd-ctl report command from
          ~/.cursor/sdd-orchestrator-ctl for the active feature and present the SDD remote
          transfer end report, including branch, feature path, transfer status,
          phase outcomes, residual risks, and Next Exact Steps.

    else:
      - id: specify
        command: speckit.specify
        integration: "{{ inputs.integration }}"
        input:
          args: >-
            ALWAYS-ON ORCHESTRATOR: Read ~/.cursor/skills/sdd-orchestrator/SKILL.md
            and run phase=specify through sdd-orchestrator. Worker follows
            .cursor/skills/speckit-specify/SKILL.md.
            Feature: {{ inputs.spec }}
            model_profile={{ inputs.model_profile }}.
      - id: clarify
        command: speckit.clarify
        integration: "{{ inputs.integration }}"
        input:
          args: >-
            ALWAYS-ON ORCHESTRATOR: Read ~/.cursor/skills/sdd-orchestrator/SKILL.md
            and run phase=clarify through sdd-orchestrator. Worker follows
            .cursor/skills/speckit-clarify/SKILL.md.
            Context: {{ inputs.spec }}
            model_profile={{ inputs.model_profile }}.
      - id: plan
        command: speckit.plan
        integration: "{{ inputs.integration }}"
        input:
          args: >-
            ALWAYS-ON ORCHESTRATOR: Read ~/.cursor/skills/sdd-orchestrator/SKILL.md
            and run phase=plan through sdd-orchestrator. Worker follows
            .cursor/skills/speckit-plan/SKILL.md.
            Scope: {{ inputs.scope }}. {{ inputs.spec }}
            model_profile={{ inputs.model_profile }}.
      - id: tasks
        command: speckit.tasks
        integration: "{{ inputs.integration }}"
        input:
          args: >-
            ALWAYS-ON ORCHESTRATOR: Read ~/.cursor/skills/sdd-orchestrator/SKILL.md
            and run phase=tasks through sdd-orchestrator. Worker follows
            .cursor/skills/speckit-tasks/SKILL.md.
            Scope: {{ inputs.scope }}. {{ inputs.spec }}
            model_profile={{ inputs.model_profile }}.
      - id: analyze
        command: speckit.analyze
        integration: "{{ inputs.integration }}"
        input:
          args: >-
            ALWAYS-ON ORCHESTRATOR: Read ~/.cursor/skills/sdd-orchestrator/SKILL.md
            and run phase=analyze through sdd-orchestrator. Worker follows
            .cursor/skills/speckit-analyze/SKILL.md.
            Context: {{ inputs.spec }}
            model_profile={{ inputs.model_profile }}.
      - id: lint-check
        type: shell
        run: "uv run ruff check"
        continue_on_error: true

      - id: handoff
        type: prompt
        integration: "{{ inputs.integration }}"
        prompt: >-
          Write .cursor/session-handoff.md per compact-handoff for Mac mini remote
          execution. Context: {{ inputs.spec }}.
          Remote phase: {{ inputs.remote_phase }}.
          Include specs path, tasks.md progress, branch, and a Resume Prompt that
          tells the remote agent to run each phase via sdd-orchestrator (always-on).
          When remote_phase=implement, continue through converge (round cap 2) then
          confidence. Prefer model_profile={{ inputs.model_profile }}.
          Reference .cursor/skills/remote-agent-handoff/SKILL.md.
          Require specify-cli >= 0.13.0 on the mini.

      - id: preflight-local
        type: shell
        run: "bash scripts/remote_agent_preflight.sh --local"

      - id: start-remote
        type: shell
        run: >-
          bash scripts/start_remote_sdd_handoff.sh
          --interval {{ inputs.interval }}
          --phase {{ inputs.remote_phase }}
          --model "{{ inputs.model }}"

      - id: preflight-remote
        type: shell
        run: "bash scripts/remote_agent_preflight.sh --remote"
        continue_on_error: true

      - id: remote-status
        type: shell
        run: "bash scripts/handoff_to_mac_mini.sh --status"
        continue_on_error: true

      - id: end-report
        type: prompt
        integration: "{{ inputs.integration }}"
        prompt: >-
          Run the absolute-path sdd-ctl report command from
          ~/.cursor/sdd-orchestrator-ctl for the active feature and present the SDD remote
          transfer end report, including branch, feature path, transfer status,
          phase outcomes, residual risks, and Next Exact Steps.
