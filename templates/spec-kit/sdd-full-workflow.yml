schema_version: "1.0"
workflow:
  id: "sdd-full"
  name: "SDD Full Cycle"
  version: "1.0.0"
  author: "Integrity"
  description: "Specify → clarify → plan → tasks → analyze → implement with review and test gates"

requires:
  speckit_version: ">=0.10.0"
  integrations:
    any:
      - "cursor-agent"
      - "claude"
      - "copilot"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build (what/why, not tech stack)"
  integration:
    type: string
    default: "auto"
    prompt: "Integration (auto uses project default, e.g. cursor-agent)"
  scope:
    type: string
    default: "full"
    enum: ["full", "api-only", "frontend-only"]

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review specs/*/spec.md before planning. Approve to continue."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "Scope: {{ inputs.scope }}. {{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review plan.md and related design docs before tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-tasks
    type: gate
    message: "Review tasks.md before implement. For 3+ boundaries consider worktree split."
    options: [approve, reject]
    on_reject: abort

  - id: lint-check
    type: shell
    run: "{LINT_CMD}"
    continue_on_error: true

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: test-suite
    type: shell
    run: "{TEST_CMD}"

  - id: handoff
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: >-
      Summarize SDD completion per compact-handoff format: branch, specs path,
      tasks.md progress (completed/total), test result, and Next Exact Steps.
      Reference docs/agents/SDD_USER_GUIDE.md.
