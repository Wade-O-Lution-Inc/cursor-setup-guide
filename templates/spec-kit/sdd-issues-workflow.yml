schema_version: "1.0"
workflow:
  id: "sdd-issues"
  name: "SDD to GitHub Issues"
  version: "1.0.0"
  author: "Integrity"
  description: "Specify → tasks → GitHub issues (requires gh CLI auth)"

requires:
  speckit_version: ">=0.10.0"
  integrations:
    any:
      - "cursor-agent"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the feature to break into GitHub issues"
  integration:
    type: string
    default: "auto"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: to-issues
    command: speckit.taskstoissues
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"
